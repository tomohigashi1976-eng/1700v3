<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トレーニング1700 v6</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --bg: #f8f9fa; --clear: #adb5bd; --exit: #ffc107; }
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: var(--bg); margin: 0; padding: 15px; color: #333; touch-action: manipulation; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active { display: block; }
        .setup-group { margin-bottom: 20px; text-align: left; background: #f1f3f5; padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { flex: 1; min-width: 100px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .opt-btn.selected { border-color: var(--primary); background: #e7f1ff; color: var(--primary); }
        .target-word { font-size: 3.2rem; font-weight: 800; color: var(--primary); margin: 25px 0; }
        .input-area { margin: 20px 0; }
        .recognition-box { min-height: 100px; border: 2px dashed #ccc; border-radius: 12px; margin-bottom: 10px; padding: 15px; background: #fffcf0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #444; }
        .handwriting-canvas { width: 100%; height: 300px; border: 3px solid var(--primary); border-radius: 15px; box-sizing: border-box; background: #fff; cursor: crosshair; touch-action: none; }
        .btn-clear { background: var(--clear); color: white; padding: 12px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .answer-display { font-size: 2.8rem; font-weight: bold; color: #d63384; margin: 20px 0; display: none; background: #fff0f6; padding: 20px; border-radius: 15px; border-left: 10px solid #d63384; }
        button.main-btn { width: 100%; padding: 22px; font-size: 1.5rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-show { background: var(--gray); color: white; }
        .btn-correct { background: var(--success); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-wrong { background: var(--danger); color: white; width: 48%; height: 100px; font-size: 1.8rem; }
        .btn-group { display: flex; justify-content: space-between; display: none; gap: 10px; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; }
        .btn-exit { background: var(--exit); color: black; padding: 8px 16px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h1>トレーニング1700 v6</h1>
        <div class="setup-group">
            <label>出題範囲 (1～1700)</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="range-start" value="1" min="1" max="1700" style="width:100%; padding:15px; border-radius:8px; border:1px solid #ccc;">
                <span style="align-self:center">～</span>
                <input type="number" id="range-end" value="1700" min="1" max="1700" style="width:100%; padding:15px; border-radius:8px; border:1px solid #ccc;">
            </div>
        </div>
        <div class="setup-group">
            <label>学習モード</label>
            <div class="option-group">
                <button class="opt-btn selected" id="m-en-jp" onclick="setMode('en-jp')">英語→日本語</button>
                <button class="opt-btn" id="m-jp-en" onclick="setMode('jp-en')">日本語→英語</button>
            </div>
        </div>
        <div class="setup-group">
            <label>順序 / 回答方法</label>
            <div class="option-group">
                <button class="opt-btn selected" id="o-asc" onclick="setOrder('asc')">番号順</button>
                <button class="opt-btn" id="o-rand" onclick="setOrder('rand')">ランダム</button>
            </div>
            <div class="option-group" style="margin-top:10px;">
                <button class="opt-btn selected" id="a-voice" onclick="setAnsMethod('voice')">音声入力</button>
                <button class="opt-btn" id="a-write" onclick="setAnsMethod('write')">手書入力</button>
            </div>
        </div>
        <button class="main-btn btn-start" onclick="startLesson()">トレーニング開始</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="quiz-header">
            <div id="progress-text" style="font-weight:bold; color:var(--gray);"></div>
            <button class="btn-exit" onclick="exitQuiz()">終了する</button>
        </div>
        <div id="mistake-mode-info" style="font-weight:bold; color:var(--danger); margin-top:10px; display:none;">間違えた問題だけ出題中！</div>
        <div class="target-word" id="target-display">---</div>
        
        <div id="ui-voice" class="input-area" style="display:none;">
            <div class="recognition-box" id="voice-output">マイクを許可して発音してください</div>
        </div>

        <div id="ui-write" class="input-area" style="display:none;">
            <canvas class="handwriting-canvas" id="handwriting-canvas"></canvas>
            <button class="btn-clear" onclick="clearInput()" style="margin-top:10px;">書き直し</button>
        </div>

        <button class="main-btn btn-show" id="show-answer-btn" onclick="revealAnswer()">回答を表示</button>
        <div class="answer-display" id="correct-answer">---</div>
        <div class="btn-group" id="judge-btns">
            <button class="btn-correct" onclick="processJudge(true)">〇 正解</button>
            <button class="btn-wrong" onclick="processJudge(false)">× 不正解</button>
        </div>
    </div>
</div>

    // --- State Management ---
    let mode = 'en-jp', order = 'asc', ansMethod = 'voice';
    let currentIndex = 0;
    let quizList = [];
    let wrongAnswers = [];
    let isMistakeMode = false;
    let recognition;
    let signaturePad;

    // --- Handwriting Canvas Setup ---
    const canvas = document.getElementById('handwriting-canvas');
    
    function resizeCanvas() {
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        if (signaturePad) {
            signaturePad.clear(); // Clear history and redraw current data
        }
    }

    // --- Setup Functions ---
    function setMode(m) { mode = m; updateOptBtns('m', m); }
    function setOrder(o) { order = o; updateOptBtns('o', o); }
    function setAnsMethod(a) { ansMethod = a; updateOptBtns('a', a); }
    function updateOptBtns(prefix, val) {
        document.querySelectorAll(`[id^="${prefix}-"]`).forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`${prefix}-${val}`).classList.add('selected');
    }

    // --- Quiz Logic ---
    function startLesson() {
        const start = parseInt(document.getElementById('range-start').value) - 1;
        const end = parseInt(document.getElementById('range-end').value);
        quizList = rawData.slice(start, end);
        
        if (order === 'rand') {
            quizList.sort(() => Math.random() - 0.5);
        }
        
        currentIndex = 0;
        wrongAnswers = [];
        isMistakeMode = false;
        document.getElementById('mistake-mode-info').style.display = 'none';
        
        showScreen('quiz-screen');
        resizeCanvas(); // Ensure canvas is sized correctly when shown
        showQuestion();
    }

    function showQuestion() {
        clearInput();
        const item = quizList[currentIndex].split('|');
        const display = (mode === 'en-jp') ? item[0] : item[1];
        document.getElementById('target-display').textContent = display;
        
        const progressPrefix = isMistakeMode ? "【復習】" : "";
        document.getElementById('progress-text').textContent = `${progressPrefix}${currentIndex + 1} / ${quizList.length}`;
        
        // Reset UI
        document.getElementById('ui-voice').style.display = (ansMethod === 'voice') ? 'block' : 'none';
        document.getElementById('ui-write').style.display = (ansMethod === 'write') ? 'block' : 'none';
        document.getElementById('correct-answer').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'block';
        
        if (ansMethod === 'voice') startVoice();
    }

    function revealAnswer() {
        const item = quizList[currentIndex].split('|');
        const ans = (mode === 'en-jp') ? item[1] : item[0];
        const display = document.getElementById('correct-answer');
        display.textContent = ans;
        display.style.display = 'block';
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('judge-btns').style.display = 'flex';
    }

    function processJudge(isCorrect) {
        if (!isCorrect) {
            wrongAnswers.push(quizList[currentIndex]);
        }
        
        currentIndex++;
        
        if (currentIndex < quizList.length) {
            showQuestion();
        } else {
            if (wrongAnswers.length > 0) {
                // Start mistake round
                quizList = [...new Set(wrongAnswers)]; // Remove duplicates
                if (order === 'rand') {
                   quizList.sort(() => Math.random() - 0.5);
                }
                wrongAnswers = [];
                currentIndex = 0;
                isMistakeMode = true;
                document.getElementById('mistake-mode-info').style.display = 'block';
                alert('間違えた問題の復習を開始します。');
                showQuestion();
            } else {
                alert("全問正解！トレーニング終了です！");
                exitQuiz();
            }
        }
    }

    function clearInput() {
        if (ansMethod === 'voice') {
            document.getElementById('voice-output').textContent = "マイクを許可して発音してください";
        } else {
            if (signaturePad) {
                signaturePad.clear();
            }
        }
    }

    function startVoice() {
        if (!('webkitSpeechRecognition' in window)) {
            document.getElementById('voice-output').textContent = "お使いのブラウザは音声認識に対応していません。";
            return;
        }
        recognition = new webkitSpeechRecognition();
        recognition.lang = (mode === 'en-jp') ? 'ja-JP' : 'en-US';
        recognition.onresult = (e) => {
            document.getElementById('voice-output').textContent = e.results[0][0].transcript;
        };
        recognition.start();
    }
    
    function exitQuiz() {
        showScreen('setup-screen');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- Initialize on Load ---
    window.addEventListener('load', () => {
        signaturePad = new SignaturePad(canvas, {
            penColor: 'black',
            minWidth: 2,
            maxWidth: 4,
        });
        resizeCanvas();
    });

    window.addEventListener('resize', resizeCanvas);

</script>
</body>
</html>
